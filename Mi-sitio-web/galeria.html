<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galería</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container py-5">

<h1 class="text-center">Galería Fitness</h1>

<div id="carrusel" class="carousel slide mt-4" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="img/foto1.jpg" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="img/foto2.jpg" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="img/foto3.jpg" class="d-block w-100">
</div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#carrusel" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#carrusel" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ejercicio 1 XML DOM</title>

<style>
body {
  font-family: Arial;
}

.divTable {
  display: table;
  width: 100%;
  border: 1px solid black;
  margin-top: 20px;
}
.divRow {
  display: table-row;
}
.divCell, .divHeader {
  display: table-cell;
  border: 1px solid black;
  padding: 8px;
}
.divHeader {
  font-weight: bold;
  background-color: #ddd;
}
table {
  border-collapse: collapse;
  margin-top: 20px;
}
td, th {
  border: 1px solid black;
  padding: 8px;
}
</style>

</head>

<body>

<h1>Ejercicio 1 - XML DOM</h1>

<h2>Tabla normal</h2>
<div id="tabla"></div>

<h2>Tabla con DIV</h2>
<div id="tablaDiv"></div>

<script>
const xhttp = new XMLHttpRequest();

xhttp.onload = function() {

  const xmlDoc = this.responseXML;
  const cds = xmlDoc.getElementsByTagName("CD");

  let tabla = "<table>";
  tabla += "<tr><th>Country</th><th>Company</th><th>Price</th><th>Year</th></tr>";

  for (let i = 0; i < cds.length; i++) {
    let country = cds[i].getElementsByTagName("COUNTRY")[0]?.textContent;
    let company = cds[i].getElementsByTagName("COMPANY")[0]?.textContent;
    let price = cds[i].getElementsByTagName("PRICE")[0]?.textContent;
    let year = cds[i].getElementsByTagName("YEAR")[0]?.textContent;

    tabla += `<tr>
      <td>${country}</td>
      <td>${company}</td>
      <td>${price}</td>
      <td>${year}</td>
    </tr>`;
  }

  tabla += "</table>";
  document.getElementById("tabla").innerHTML = tabla;


  let divTable = "<div class='divTable'>";

  divTable += `
    <div class='divRow'>
      <div class='divHeader'>Country</div>
      <div class='divHeader'>Company</div>
      <div class='divHeader'>Price</div>
      <div class='divHeader'>Year</div>
    </div>
  `;

  for (let i = 0; i < cds.length; i++) {
    let country = cds[i].getElementsByTagName("COUNTRY")[0]?.textContent;
    let company = cds[i].getElementsByTagName("COMPANY")[0]?.textContent;
    let price = cds[i].getElementsByTagName("PRICE")[0]?.textContent;
    let year = cds[i].getElementsByTagName("YEAR")[0]?.textContent;

    divTable += `
      <div class='divRow'>
        <div class='divCell'>${country}</div>
        <div class='divCell'>${company}</div>
        <div class='divCell'>${price}</div>
        <div class='divCell'>${year}</div>
      </div>
    `;
  }

  divTable += "</div>";
  document.getElementById("tablaDiv").innerHTML = divTable;

};

xhttp.open("GET", "https://www.w3schools.com/xml/cd_catalog.xml");
xhttp.send();
</script>

</body>
</html>
